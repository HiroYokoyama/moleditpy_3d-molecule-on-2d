name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 4.0.0 — without leading v)'
        required: true
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Verify version matches plugin source
        run: |
          INPUT="$VERSION"
          FILE_VERSION=$(python3 -c "
          import re, sys
          text = open('3d_molecule_on_2d.py', encoding='utf-8').read()
          m = re.search(r\"PLUGIN_VERSION\s*=\s*['\\\"](.+?)['\\\"]\", text)
          print(m.group(1).strip() if m else '')
          ")
          echo "Input version : $INPUT"
          echo "File version  : $FILE_VERSION"
          if [ "$INPUT" != "$FILE_VERSION" ]; then
            echo "ERROR: input version '$INPUT' does not match PLUGIN_VERSION '$FILE_VERSION' in 3d_molecule_on_2d.py"
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$VERSION"
          gh release create "v$TAG" \
            --title "3D Molecule on 2D $TAG" \
            --generate-notes \
            3d_molecule_on_2d.py

      - name: Trigger moleditpy-plugins registry update
        if: success()
        continue-on-error: true
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_PAT }}
        run: |
          TAG="$VERSION"
          if [ -n "$REGISTRY_PAT" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $REGISTRY_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/HiroYokoyama/moleditpy-plugins/dispatches" \
              -d "{\"event_type\":\"plugin_release\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"tag\":\"v$TAG\"}}"
          fi