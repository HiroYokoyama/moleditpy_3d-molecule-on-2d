name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        path: moleditpy_3d-molecule-on-2d

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest rdkit

    - name: Clone main MoleditPy application
      run: |
        git clone --depth 1 \
          https://github.com/HiroYokoyama/python_molecular_editor.git \
          python_molecular_editor

    - name: Run test suite
      run: |
        cd moleditpy_3d-molecule-on-2d
        python -m pytest tests/ -v
